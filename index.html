<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Other Side - Ghost Tracker v2</title>
<style>
/* === CORE VARIABLES === */
:root {
--bg-dark: #0d0d0d;
--bg-panel: #151515;
--bg-card: #1a1a1a;
--bg-card-hover: #202020;
--text-main: #f0f0f0;
--text-dim: #909090;
--text-muted: #666;
--accent: #a855f7;
--accent-2: #c084fc;
--border: #2a2a2a;
--border-strong: #3a3a3a;
--success: #22c55e;
--warning: #f59e0b;
--danger: #ef4444;
--purple: #a855f7;
--cyan: #06b6d4;
--red: #ef4444;
--green: #22c55e;
--blue: #3b82f6;
--yellow: #eab308;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }

/* === HEADER === */
header { background: linear-gradient(135deg, var(--bg-panel) 0%, #1a1a25 100%); padding: 12px 24px; border-bottom: 1px solid var(--border-strong); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.header-title { display: flex; align-items: center; gap: 12px; }
.header-title h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header-actions { display: flex; gap: 8px; }
.theme-toggle, .hunt-mode-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.theme-toggle:hover, .hunt-mode-btn:hover { border-color: var(--accent); color: var(--accent); }

/* === LAYOUT === */
.main-content { display: flex; flex: 1; overflow: hidden; }

/* === SIDEBAR === */
.sidebar { width: 360px; background: var(--bg-panel); border-right: 1px solid var(--border-strong); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-scroll { padding: 16px; overflow-y: auto; flex: 1; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-section h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.5px; }

/* === RESET BUTTON === */
.reset-all-btn { width: 100%; padding: 10px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: var(--danger); font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.reset-all-btn:hover { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }

/* === EVIDENCE GRID === */
.evidence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.ev-btn { padding: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; cursor: pointer; text-align: center; font-size: 0.8rem; transition: all 0.2s; font-weight: 600; }
.ev-btn:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
.ev-btn[data-ev="EMF 20+"].active { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); box-shadow: 0 0 12px rgba(239, 68, 68, 0.2); }
.ev-btn[data-ev="Audio"].active { background: rgba(6, 182, 212, 0.15); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 12px rgba(6, 182, 212, 0.2); }
.ev-btn[data-ev="UV"].active { background: rgba(168, 85, 247, 0.15); border-color: var(--purple); color: var(--purple); box-shadow: 0 0 12px rgba(168, 85, 247, 0.2); }
.ev-btn[data-ev="Writing"].active { background: rgba(34, 197, 94, 0.15); border-color: var(--success); color: var(--success); box-shadow: 0 0 12px rgba(34, 197, 94, 0.2); }
.ev-btn[data-ev="Freezing"].active { background: rgba(59, 130, 246, 0.15); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 12px rgba(59, 130, 246, 0.2); }
.ev-btn[data-ev="Radiation"].active { background: rgba(234, 179, 8, 0.15); border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 12px rgba(234, 179, 8, 0.2); }
.ev-btn.excluded { background: rgba(40, 40, 40, 0.5); border-color: #333; color: #444; text-decoration: line-through; opacity: 0.5; }

/* === TOGGLE BOXES === */
.toggle-box { width: 100%; padding: 10px; margin-bottom: 6px; border-radius: 6px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; text-align: left; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; position: relative; display: flex; justify-content: space-between; align-items: center; }
.toggle-box:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }
.toggle-box:active { transform: translateY(1px); }
.toggle-box span { flex: 1; }
.toggle-box::after { content: attr(data-state-text); font-size: 0.7rem; color: var(--text-muted); }
/* BREAKER STATES */
.toggle-box.breaker[data-state="1"] { background: rgba(6, 182, 212, 0.15); border-color: var(--cyan); color: var(--cyan); }
.toggle-box.breaker[data-state="2"] { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); }
/* LIGHTS STATES */
.toggle-box.lights[data-state="1"] { background: rgba(234, 179, 8, 0.15); border-color: var(--yellow); color: var(--yellow); }
.toggle-box.lights[data-state="2"] { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); }
.toggle-box.lights[data-state="3"] { background: rgba(34, 197, 94, 0.15); border-color: var(--success); color: var(--success); }
.toggle-box.lights[data-state="4"] { background: rgba(168, 85, 247, 0.15); border-color: var(--purple); color: var(--purple); }
/* RADIO STATES */
.toggle-box.radio[data-state="1"] { background: rgba(234, 179, 8, 0.15); border-color: var(--yellow); color: var(--yellow); }
.toggle-box.radio[data-state="2"] { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); }
.toggle-box.radio[data-state="3"] { background: rgba(34, 197, 94, 0.15); border-color: var(--success); color: var(--success); }
    .toggle-box.lights[data-state="1"]::after { content: "ON"; }
    .toggle-box.lights[data-state="2"]::after { content: "OFF"; }
    .toggle-box.lights[data-state="3"]::after { content: "BOTH"; }
    .toggle-box.lights[data-state="4"]::after { content: "IGNORE"; }
  .toggle-box.radio[data-state="4"] { background: rgba(168, 85, 247, 0.15); border-color: var(--purple); color: var(--purple); }
/* ACTION STATES */
.toggle-box.action[data-state="1"] { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); }
.toggle-box.action[data-state="2"] { background: rgba(34, 197, 94, 0.15); border-color: var(--success); color: var(--success); }
/* DYNAMIC TEXT AFTER */
.toggle-box.doors[data-state="1"]::after { content: "SLAMS"; }
.toggle-box.doors[data-state="2"]::after { content: "NEVER"; }


/* CANDLE STATES */
    .toggle-box.candle[data-state="0"] { }
    .toggle-box.candle[data-state="1"] { background: rgba(234, 179, 8, 0.15); border-color: var(--yellow); color: var(--yellow); }
    .toggle-box.candle[data-state="2"] { background: rgba(239, 68, 68, 0.15); border-color: var(--red); color: var(--red); }
      .toggle-box.candle[data-state="3"] { background: rgba(168, 85, 247, 0.15); border-color: var(--purple); color: var(--purple); }
  
  
  
      .toggle-box.candle[data-state="0"]::after { content: ""; }
    .toggle-box.candle[data-state="1"]::after { content: "ON"; }
    .toggle-box.candle[data-state="2"]::after { content: "OFF"; }
    .toggle-box.candle[data-state="3"]::after { content: "IGNORE"; }
  .toggle-box.holy[data-state="1"]::after { content: "3S"; }
.toggle-box.holy[data-state="2"]::after { content: "5S"; }
.toggle-box.manifest[data-state="1"]::after { content: "FULL"; }
.toggle-box.manifest[data-state="2"]::after { content: "SHADOW"; }
.toggle-box.flx[data-state="1"]::after { content: "INTERACT"; }
.toggle-box.flx[data-state="2"]::after { content: "IGNORE"; }
  /* RADIO TEXT AFTER */
.toggle-box.radio[data-state="0"]::after { content: "IGNORE"; }
.toggle-box.radio[data-state="1"]::after { content: "ON"; }
.toggle-box.radio[data-state="2"]::after { content: "OFF"; }
.toggle-box.radio[data-state="3"]::after { content: "BOTH"; }
.toggle-box.radio[data-state="4"]::after { content: "IGNORE"; }


/* === TIMER === */
.timer-container { background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 8px; padding: 12px; margin-top: 12px; }
.timer-display { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 1.75rem; color: var(--accent-2); text-align: center; background: #000; padding: 10px; border-radius: 6px; border: 1px solid #222; letter-spacing: 2px; }
.timer-controls { display: flex; gap: 6px; margin-top: 8px; }
.timer-btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; transition: all 0.2s; }
.btn-start { background: rgba(34, 197, 94, 0.15); color: var(--success); border-color: rgba(34, 197, 94, 0.3); }
.btn-start:hover { background: rgba(34, 197, 94, 0.25); }
.btn-stop { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: rgba(239, 68, 68, 0.3); display: none; }
.btn-stop:hover { background: rgba(239, 68, 68, 0.25); }
.btn-reset { background: var(--bg-card-hover); color: var(--text-dim); }
.btn-reset:hover { background: var(--border-strong); color: var(--text-main); }

/* === SELECT DROPS === */
.select-drop { width: 100%; padding: 8px 10px; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; margin-bottom: 6px; cursor: pointer; }
.select-drop:hover { border-color: var(--border-strong); }

/* === CONTENT AREA === */
.content-area { flex: 1; padding: 0; overflow-y: auto; background: var(--bg-dark); display: flex; flex-direction: column; }
.content-scroll { padding: 20px; overflow-y: auto; flex: 1; }
.ghost-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

.ghost-card { background: var(--bg-card); border-radius: 10px; padding: 16px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: all 0.2s; position: relative; }
.ghost-card:hover { border-color: var(--accent); background: var(--bg-card-hover); transform: translateY(-2px); }
.ghost-card.eliminated { opacity: 0.3; border-color: var(--danger); background: #151515; }
.ghost-card.eliminated:hover { transform: none; }
.ghost-card.eliminated::before { content: "✕"; position: absolute; top: 10px; right: 14px; color: var(--danger); font-weight: bold; font-size: 1.2rem; z-index: 2; }
.ghost-header { display: flex; align-items: baseline; gap: 8px; }
.ghost-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
.ghost-lore { font-size: 0.75rem; color: var(--text-muted); font-style: italic; line-height: 1.3; }
.ghost-behavior { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; border-top: 1px dashed var(--border); padding-top: 10px; }
.behavior-point { display: block; margin-bottom: 5px; position: relative; padding-left: 12px; }
.behavior-point::before { content: "▸"; position: absolute; left: 0; color: var(--accent); font-size: 0.7rem; }
.evidence-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.evidence-chip { font-size: 0.65rem; padding: 3px 8px; border-radius: 10px; background: var(--bg-card-hover); color: var(--text-dim); border: 1px solid var(--border); font-weight: 600; }
.evidence-chip.match[data-ev="EMF 20+"] { border-color: var(--red); color: var(--red); background: rgba(239, 68, 68, 0.1); }
.evidence-chip.match[data-ev="Audio"] { border-color: var(--cyan); color: var(--cyan); background: rgba(6, 182, 212, 0.1); }
.evidence-chip.match[data-ev="UV"] { border-color: var(--purple); color: var(--purple); background: rgba(168, 85, 247, 0.1); }
.evidence-chip.match[data-ev="Writing"] { border-color: var(--success); color: var(--success); background: rgba(34, 197, 94, 0.1); }
.evidence-chip.match[data-ev="Freezing"] { border-color: var(--blue); color: var(--blue); background: rgba(59, 130, 246, 0.1); }
.evidence-chip.match[data-ev="Radiation"] { border-color: var(--yellow); color: var(--yellow); background: rgba(234, 179, 8, 0.1); }
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.stat { font-size: 0.7rem; color: var(--text-dim); }
.stat-label { opacity: 0.7; display: block; margin-bottom: 2px; }
.stat-val { font-weight: 700; font-size: 0.75rem; }

/* === STICKY COUNTER === */
.ghost-count { font-size: 0.7rem; color: var(--text-muted); text-align: center; padding: 8px; background: var(--bg-panel); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
.ghost-count span { color: var(--accent-2); font-weight: 700; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* === STICKY BAR === */
.sticky-bar { position: sticky; top: 0; background: var(--bg-panel); z-index: 50; padding: 12px 20px; border-bottom: 1px solid var(--border-strong); display: none; }
.sticky-bar.active { display: flex; gap: 16px; align-items: center; }

/* === MOBILE RESPONSIVE === */
@media screen and (max-width: 768px) {
body { height: auto; overflow-y: auto; }
.main-content { flex-direction: column; }
.sidebar { width: 100%; height: auto; order: -1; border-right: none; border-bottom: 2px solid var(--border-strong); }
.sidebar-scroll { padding: 12px; overflow: visible; }
.content-scroll { padding: 12px; overflow: visible; }
.ghost-grid { grid-template-columns: 1fr; gap: 12px; }
.evidence-grid { gap: 4px; }
.ev-btn { padding: 12px 8px; font-size: 0.85rem; }
.sidebar-section { margin-bottom: 16px; }
.toggle-box { padding: 12px; font-size: 0.85rem; }
header { padding: 10px 16px; flex-direction: column; gap: 8px; text-align: center; }
.header-title { flex-direction: column; gap: 4px; }
.header-actions { flex-wrap: wrap; justify-content: center; }
.ghost-count { position: relative; }
.sticky-bar.active { display: none; }
}

/* === NO EVIDENCE FILTER === */
.no-ev-btn { width: 100%; margin-top: 8px; padding: 8px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s; }
.no-ev-btn:hover { border-color: var(--accent); color: var(--accent); }
.no-ev-btn.active { background: rgba(168, 85, 247, 0.15); border-color: var(--purple); color: var(--purple); }

/* === HUNT MODE === */
.hunt-mode-active .ghost-card:not(.candidate) { display: none; }
.hunt-mode-active .ghost-card.candidate { border-color: var(--success); box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }

/* === EMPTY STATE === */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-state h4 { font-size: 1rem; color: var(--text-dim); margin-bottom: 8px; }
.empty-state p { font-size: 0.85rem; }

/* === INSTRUCTION BAR === */
.instruction-bar { background: var(--bg-card); border: 1px solid var(--border); padding: 10px; margin-bottom: 16px; text-align: center; color: var(--text-dim); font-size: 0.8rem; border-radius: 6px; }
.instruction-bar span { color: var(--accent-2); font-weight: 600; }

/* === BADGE === */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
.badge-fast { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
.badge-variable { background: rgba(168, 85, 247, 0.2); color: var(--purple); }

</style>
</head>
<body>
<header>
<div class="header-title">
<h1>Ghost Tracker</h1>
<span style="font-size:0.7rem;color:var(--text-muted);">The Other Side</span>
</div>
<div class="header-actions">
<button class="hunt-mode-btn" id="huntModeBtn" onclick="toggleHuntMode()">Hunt Mode</button>
</div>
</header>

<div class="main-content">
<aside class="sidebar">
<div class="sidebar-scroll">
<button class="reset-all-btn" onclick="resetAll()">Reset All</button>

<div class="sidebar-section">
<h3>Evidence Found</h3>
<div class="evidence-grid" id="evidence-container"></div>
<button class="no-ev-btn" id="noEvBtn" onclick="toggleNoEvidence()">No Evidence Found</button>
</div>

<div class="sidebar-section">
<h3>Behaviors &amp; Interactions</h3>
<div class="toggle-box action breaker" id="btn-breaker" data-state="0" onclick="cycleBinary(this,'breaker')"><span>Breaker</span></div>
<div class="toggle-box action manifest" id="btn-manifest" data-state="0" onclick="cycleBinary(this,'manifest')"><span>Manifest</span></div>
<div class="toggle-box action holy" id="btn-holy" data-state="0" onclick="cycleBinary(this,'holy')"><span>Holy Spray</span></div>
<div class="toggle-box action doors" id="btn-doors" data-state="0" onclick="cycleBinary(this,'doors')"><span>Doors</span></div>
<div class="toggle-box action candle" id="btn-candle" data-state="0" onclick="cycleBinary(this,'candle')"><span>Candles</span></div>
<div class="toggle-box action flx" id="btn-flx" data-state="0" onclick="cycleBinary(this,'flx')"><span>FLX-POD</span></div>
<div class="toggle-box lights" id="btn-lights" data-state="0" onclick="cycleLights(this)"><span>Lights</span></div>
<div class="toggle-box radio" id="btn-radio" data-state="0" onclick="cycleRadio(this)"><span>Radios</span></div>

<div class="timer-container">
<div class="timer-display" id="timerDisplay">00:00</div>
<div class="timer-controls">
<button class="timer-btn btn-start" id="btnStart" onclick="startTimer()">Start</button>
<button class="timer-btn btn-stop" id="btnStop" onclick="stopTimer()">Stop</button>
<button class="timer-btn btn-reset" onclick="resetTimer()">Reset</button>
</div>
</div>
</div>

<div class="sidebar-section">
<h3>Speed &amp; Range</h3>
<select id="speed-select" class="select-drop" onchange="filterGhosts()">
<option value="all">Any Base Speed</option>
<option value="Normal">Normal</option>
<option value="Fast">Fast</option>
<option value="Variable">Variable</option>
</select>
<select id="losspeed-select" class="select-drop" onchange="filterGhosts()">
<option value="all">Any LOS Speed</option>
<option value="Normal">Normal</option>
<option value="Medium">Medium</option>
<option value="Fast">Fast</option>
</select>
<select id="los-select" class="select-drop" onchange="filterGhosts()">
<option value="all">Any LOS Range</option>
<option value="Low">Low</option>
<option value="Normal">Normal</option>
<option value="High">High</option>
<option value="Very High">Very High</option>
<option value="Variable">Variable</option>
</select>
</div>

<div style="font-size:0.7rem;color:var(--text-muted);text-align:center;margin-top:16px;">Created by Create_by_colegas</div>
</div>
</aside>

<main class="content-area">
<div class="ghost-count" id="ghostCount">Showing <span id="ghostCountNum">0</span> ghosts</div>
<div class="content-scroll">
<div class="ghost-grid" id="ghostGrid"></div>
</div>
</main>
</div>

{name:"The Echo",ev:["Freezing","Radiation","UV"],speed:"Normal",losspeed:"Normal",los:"Normal",hw:"Normal (3s)",lore:"A passive residual spirit.",desc:["Ignores candles","Ignores FLX-POD","Ignores lights and radios","Ignores breaker"],tags:["candles-ignore","lights-ignore","radio-ignore","flx-ignore","no-lights-on","doors","no-radios","no-breaker","spray-normal"]},

{name:"Wewe Gombel",ev:["EMF 20+","Freezing","Radiation"],speed:"Normal",losspeed:"Fast",los:"Normal",hw:"More Effective (5s)",lore:"A vengeful spirit.",desc:["Blows out candles","Drastic speed increase","Only turns lights off","Can't use breaker","Shorter cooldown"],tags:["extinguish","lights-off","no-lights-on","doors","radio-on","radio-off","no-breaker","short-cooldown","spray-more"]},
{name:"Wisp",ev:["Audio","Freezing","Radiation"],speed:"Fast",losspeed:"Medium",los:"Normal",hw:"More Effective (5s)",lore:"Fast and alluring.",desc:["Ignores candles","Turns lights on only","Speed increase","Holy Spray stops hunt 2min"],tags:["candles-ignore","lights-on","doors","radio-on","radio-off","spray-more"]},
{name:"Wraith",ev:["Audio","Freezing","UV"],speed:"Fast",losspeed:"Fast",los:"Very High",hw:"More Effective (5s)",lore:"Swift and vengeful.",desc:["Blows out candles","No feet during hunt","Targets specific player","Very high LOS","Holy Spray reduces speed","No heartbeat"],tags:["extinguish","lights-on","lights-off","doors","radio-on","radio-off","spray-more"]},
];

const evidenceTypes = ["Audio","EMF 20+","Freezing","Radiation","UV","Writing"];
let activeEvidence = new Set();
let excludedEvidence = new Set();
let eliminatedGhosts = new Set();
let noEvidenceMode = false;
let huntMode = false;
let timerInterval = null;
let seconds = 0;
let isRunning = false;

/* === TOGGLE STATES === */
let candleState = 0, lightsState = 0, radioState = 0, holyState = 0;
let doorState = 0, flxState = 0, breakerState = 0, manifestState = 0;

window.onload = function() {
renderEvidenceButtons();
renderGhosts(ghosts);
};

/* === RENDER FUNCTIONS === */
function renderEvidenceButtons() {
const c = document.getElementById('evidence-container');
evidenceTypes.forEach(ev => {
const b = document.createElement('div');
b.className = 'ev-btn';
b.innerText = ev;
b.setAttribute('data-ev', ev);
b.onclick = () => toggleEvidence(b, ev);
c.appendChild(b);
});
}

function renderGhosts(list) {
const g = document.getElementById('ghostGrid');
const gc = document.getElementById('ghostCountNum');
gc.innerText = list.length;

if(list.length === 0) {
g.innerHTML = '<div class="empty-state"><h4>No ghosts match your filters</h4><p>Try adjusting evidence or behavior settings.</p></div>';
return;
}

g.innerHTML = '';
list.forEach(gh => {
let evChips = gh.ev.map(e => {
let m = activeEvidence.has(e) ? 'match' : '';
return '<span class="evidence-chip '+m+'" data-ev="'+e+'">'+e+'</span>';
}).join('');
let descHTML = gh.desc.map(d => '<span class="behavior-point">'+d+'</span>').join('');

let speedColor = '#22c55e';
if(gh.speed === 'Fast') speedColor = '#ef4444';
if(gh.speed === 'Variable') speedColor = '#a855f7';

let losspeedColor = '#32cd32';
if(gh.losspeed === 'Medium') losspeedColor = '#eab308';
if(gh.losspeed === 'Fast') losspeedColor = '#ef4444';

let losColor = '#32cd32';
if(gh.los === 'Low') losColor = '#eab308';
if(gh.los === 'High') losColor = '#ef4444';
if(gh.los === 'Very High') losColor = '#7f1d1d';
if(gh.los === 'Variable') losColor = '#a855f7';

let hwColor = '#ef4444';
if(gh.hw.includes('Effective') && !gh.hw.includes('Less')) hwColor = '#22c55e';

const card = document.createElement('div');
card.className = 'ghost-card';
if(eliminatedGhosts.has(gh.name)) card.classList.add('eliminated');
if(huntMode) card.classList.add('candidate');

card.onclick = () => toggleElimination(gh.name, card);

card.innerHTML = '<div class="ghost-header"><span class="ghost-name">'+gh.name+'</span>'+
(gh.speed === 'Fast' ? '<span class="badge badge-fast">Fast</span>' : gh.speed === 'Variable' ? '<span class="badge badge-variable">Var</span>' : '')+
'</div>'+
'<div class="ghost-lore">'+gh.lore+'</div>'+
'<div class="ghost-behavior">'+descHTML+'</div>'+
'<div class="evidence-chips">'+evChips+'</div>'+
'<div class="stats-row">'+
'<div class="stat"><span class="stat-label">Speed</span><span class="stat-val" style="color:'+speedColor+'">'+gh.speed+'</span></div>'+
'<div class="stat"><span class="stat-label">LOS Speed</span><span class="stat-val" style="color:'+losspeedColor+'">'+gh.losspeed+'</span></div>'+
'<div class="stat"><span class="stat-label">LOS Range</span><span class="stat-val" style="color:'+losColor+'">'+gh.los+'</span></div>'+
'<div class="stat"><span class="stat-label">Holy Spray</span><span class="stat-val" style="color:'+hwColor+'">'+gh.hw+'</span></div>'+
'</div>';
g.appendChild(card);
});
}
/* === LOGIC FUNCTIONS === */
function toggleElimination(name, card) {
if(eliminatedGhosts.has(name)) {
eliminatedGhosts.delete(name);
card.classList.remove('eliminated');
} else {
eliminatedGhosts.add(name);
card.classList.add('eliminated');
}
}

function toggleEvidence(btn, type) {
if(activeEvidence.has(type)) {
activeEvidence.delete(type);
excludedEvidence.add(type);
btn.classList.remove('active');
btn.classList.add('excluded');
} else if(excludedEvidence.has(type)) {
excludedEvidence.delete(type);
btn.classList.remove('excluded');
} else {
activeEvidence.add(type);
btn.classList.add('active');
}
filterGhosts();
}

function toggleNoEvidence() {
noEvidenceMode = !noEvidenceMode;
const btn = document.getElementById('noEvBtn');
if(noEvidenceMode) {
btn.classList.add('active');
btn.innerText = 'Evidence Found';
} else {
btn.classList.remove('active');
btn.innerText = 'No Evidence Found';
}
filterGhosts();
}

function toggleHuntMode() {
huntMode = !huntMode;
const btn = document.getElementById('huntModeBtn');
btn.style.background = huntMode ? 'rgba(34,197,94,0.2)' : '';
btn.style.color = huntMode ? 'var(--success)' : '';
btn.style.borderColor = huntMode ? 'var(--success)' : '';
filterGhosts();
}

function cycleLights(btn) {
lightsState = (lightsState + 1) % 5;
btn.dataset.state = lightsState;
filterGhosts();
}

function cycleRadio(btn) {
radioState = (radioState + 1) % 5;
btn.dataset.state = radioState;
filterGhosts();
}

function cycleBinary(btn, type) {
if(type === 'doors') { doorState = (doorState + 1) % 3; btn.dataset.state = doorState; }
else if(type === 'candle') { candleState = (candleState + 1) % 34; btn.d4ataset.state = candleState; }
else if(type === 'holy') { holyState = (holyState + 1) % 3; btn.dataset.state = holyState; }
else if(type === 'flx') { flxState = (flxState + 1) % 3; btn.dataset.state = flxState; }
else if(type === 'breaker') { breakerState = (breakerState + 1) % 3; btn.dataset.state = breakerState; }
else if(type === 'manifest') { manifestState = (manifestState + 1) % 3; btn.dataset.state = manifestState; }
filterGhosts();
}
function resetAll() {
activeEvidence.clear();
excludedEvidence.clear();
eliminatedGhosts.clear();
noEvidenceMode = false;
huntMode = false;
document.querySelectorAll('.ev-btn').forEach(b => { b.classList.remove('active','excluded'); });
document.querySelectorAll('.toggle-box').forEach(b => b.dataset.state = 0);
document.getElementById('speed-select').value = 'all';
document.getElementById('losspeed-select').value = 'all';
document.getElementById('los-select').value = 'all';
document.getElementById('noEvBtn').classList.remove('active');
document.getElementById('noEvBtn').innerText = 'No Evidence Found';
const hb = document.getElementById('huntModeBtn');
hb.style.background = ''; hb.style.color = ''; hb.style.borderColor = '';
candleState = lightsState = radioState = holyState = 0;
doorState = flxState = breakerState = manifestState = 0;
document.getElementById('btn-candle').dataset.state = 0;
document.getElementById('btn-lights').dataset.state = 0;
document.getElementById('btn-radio').dataset.state = 0;
document.getElementById('btn-holy').dataset.state = 0;
document.getElementById('btn-doors').dataset.state = 0;
document.getElementById('btn-flx').dataset.state = 0;
document.getElementById('btn-breaker').dataset.state = 0;
document.getElementById('btn-manifest').dataset.state = 0;
filterGhosts();
resetTimer();
}

/* === TIMER === */
function startTimer() {
if(isRunning) return;
isRunning = true;
document.getElementById('btnStart').style.display = 'none';
document.getElementById('btnStop').style.display = 'inline-block';
timerInterval = setInterval(() => { seconds++; updateTimerDisplay(); }, 1000);
}
function stopTimer() {
if(!isRunning) return;
isRunning = false;
clearInterval(timerInterval);
document.getElementById('btnStart').style.display = 'inline-block';
document.getElementById('btnStop').style.display = 'none';
}
function resetTimer() {
stopTimer();
seconds = 0;
updateTimerDisplay();
}
function updateTimerDisplay() {
const m = Math.floor(seconds / 60).toString().padStart(2, '0');
const s = (seconds % 60).toString().padStart(2, '0');
document.getElementById('timerDisplay').innerText = m + ':' + s;
}
/* === FILTER === */
function filterGhosts() {
const sp = document.getElementById('speed-select').value;
const lsp = document.getElementById('losspeed-select').value;
const los = document.getElementById('los-select').value;

const filtered = ghosts.filter(g => {
if(noEvidenceMode) {
if(g.ev.some(e => activeEvidence.has(e) || excludedEvidence.has(e))) return false;
} else {
for(let ev of activeEvidence) { if(!g.ev.includes(ev)) return false; }
for(let ev of excludedEvidence) { if(g.ev.includes(ev)) return false; }
}
if(sp !== 'all' && g.speed !== sp) return false;
if(lsp !== 'all' && g.losspeed !== lsp) return false;
if(los !== 'all' && g.los !== los) return false;
if(candleState === 1 && !g.tags.includes('extinguish')) return false;
if(candleState === 2 && !g.tags.includes('candles-ignore')) return false;
if(lightsState === 1 && !g.tags.includes('lights-on')) return false;
if(lightsState === 2 && !g.tags.includes('lights-off')) return false;
if(lightsState === 3 && (!g.tags.includes('lights-on') || !g.tags.includes('lights-off'))) return false;
if(lightsState === 4 && !g.tags.includes('lights-ignore')) return false;
if(radioState === 1 && !g.tags.includes('radio-on')) return false;
if(radioState === 2 && !g.tags.includes('radio-off')) return false;
if(radioState === 3 && (!g.tags.includes('radio-on') || !g.tags.includes('radio-off'))) return false;
if(radioState === 4 && !g.tags.includes('radio-ignore')) return false;
if(holyState === 1 && !g.tags.includes('spray-normal')) return false;
if(holyState === 2 && !g.tags.includes('spray-more')) return false;
if(doorState === 1 && g.tags.includes('no-doors')) return false;
if(doorState === 2 && !g.tags.includes('no-doors')) return false;
if(flxState === 1 && g.tags.includes('flx-ignore')) return false;
if(flxState === 2 && !g.tags.includes('flx-ignore')) return false;
if(breakerState === 1 && g.tags.includes('no-breaker')) return false;
if(breakerState === 2 && !g.tags.includes('no-breaker')) return false;
if(manifestState === 1 && g.tags.includes('shadow-only')) return false;
if(manifestState === 2 && !g.tags.includes('shadow-only')) return false;
return true;
});

renderGhosts(filtered);
}

</script>
